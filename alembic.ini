# Alembic — migration komutları proje kökünden: alembic revision --autogenerate -m "msg"
# Veritabanı URL'si env.py içinde Settings'ten okunur.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# env.py içinde Settings.DATABASE_URL ile üzerine yazılır
sqlalchemy.url = postgresql+psycopg2://user:password@localhost:5432/ecommerce_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
